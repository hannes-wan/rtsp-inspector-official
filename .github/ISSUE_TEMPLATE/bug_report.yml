name: Bug report
description: Report reproducible RTSP Inspector behavior
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve RTSP Inspector. Do not attach secrets or private customer files.
  - type: input
    id: version
    attributes:
      label: App version
      placeholder: "1.0.3"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options: ["Windows 11", "Windows 10", "Linux (AppImage)", "Linux (DEB)", "Linux (RPM)", "Other"]
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Use the smallest safe input or describe it without uploading private data.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed credentials, license data, and private customer or patient material.
          required: true
