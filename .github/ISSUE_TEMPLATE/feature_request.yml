name: Feature request
description: Propose a focused RTSP Inspector workflow improvement
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Workflow problem
      description: What real task is difficult today?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe the result, not only a button or implementation.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Example or evidence
      description: Keep examples public-safe and remove private data.
